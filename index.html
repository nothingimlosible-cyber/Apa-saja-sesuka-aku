<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STORE HYPE AFFILIATE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        * { font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.3s ease; }
        body { background-color: #f8fafc; padding-bottom: 5rem; }
        .hero-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        
        /* CSS ADMIN - JANGAN DIUBAH */
        .admin-only { display: none !important; }
        body.is-admin .admin-only { display: block !important; }
    </style>
</head>
<body onload="load()">

    <nav class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md border-b px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black italic text-slate-900">HYPE<span class="text-indigo-600">STORE.</span></h1>
            <button onclick="toggleLogin()" class="text-slate-400 hover:text-indigo-600">
                <i class="fas fa-fingerprint text-2xl"></i>
            </button>
        </div>
    </nav>

    <section class="mt-24 px-4">
        <div class="max-w-7xl mx-auto hero-gradient rounded-[2.5rem] p-8 md:p-16 text-white text-center">
            <h2 class="text-4xl md:text-6xl font-black uppercase italic">Style Baru <br>Mulai Disini.</h2>
        </div>
    </section>

    <section id="adminDashboard" class="admin-only px-4 mt-8">
        <div class="max-w-7xl mx-auto bg-white p-6 rounded-[2.5rem] border-2 border-dashed border-indigo-200 shadow-md">
            <h4 class="text-xs font-black text-indigo-600 mb-4 uppercase">Tambah Produk</h4>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <input type="text" id="pName" placeholder="Nama Produk" class="p-4 bg-slate-50 rounded-xl border">
                <input type="text" id="pPrice" placeholder="Harga" class="p-4 bg-slate-50 rounded-xl border">
                <input type="url" id="pLink" placeholder="Link Shopee" class="p-4 bg-slate-50 rounded-xl border">
                <input type="text" id="pSource" placeholder="SHOPEE / TIKTOK" class="p-4 bg-slate-50 rounded-xl border uppercase">
                <div class="md:col-span-2">
                    <input type="file" id="pFile" accept="image/*" class="w-full p-4 bg-slate-50 border rounded-xl">
                </div>
            </div>
            <button onclick="saveProduct()" id="btnSave" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black uppercase mt-4">Publish Produk</button>
        </div>
    </section>

    <section id="katalog" class="px-4 py-12">
        <div class="max-w-7xl mx-auto">
            <div id="grid" class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <p class="col-span-full text-center py-10">Memuat koleksi...</p>
            </div>
        </div>
    </section>

    <div id="loginBox" class="hidden fixed inset-0 z-[100] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-[2.5rem] w-full max-w-xs text-center">
            <h3 class="font-black mb-4">ADMIN LOGIN</h3>
            <input type="password" id="passInput" placeholder="Passkey" class="w-full p-4 bg-slate-50 rounded-2xl mb-4 text-center border outline-none">
            <button onclick="login()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black">AUTHORIZE</button>
            <button onclick="toggleLogin()" class="mt-4 text-slate-400 text-[10px] font-bold">BATAL</button>
        </div>
    </div>

    <script>
        function toggleLogin() { document.getElementById('loginBox').classList.toggle('hidden'); }

        async function login() {
            const pass = document.getElementById('passInput').value;
            try {
                const res = await fetch('/api/auth', { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({password: pass}) 
                });
                const result = await res.json();
                
                if(result.success === true || result.success === "true") { 
                    document.body.classList.add('is-admin'); 
                    toggleLogin();
                    alert("Login Berhasil!");
                } else { 
                    alert("Password Salah!"); 
                }
            } catch (err) { alert("Gagal Login ke Server"); }
        }

        async function load() {
            const grid = document.getElementById('grid');
            try {
                const res = await fetch('/api/katalog');
                const data = await res.json();
                grid.innerHTML = data.reverse().map(p => `
                    <div class="bg-white rounded-[2rem] border p-2 text-center">
                        <img src="${p.img}" class="rounded-[1.6rem] aspect-[4/5] object-cover w-full">
                        <h3 class="font-bold mt-2">${p.nama}</h3>
                        <p class="text-indigo-600 font-black">${p.harga}</p>
                        <a href="${p.link}" target="_blank" class="block bg-slate-900 text-white py-2 rounded-xl mt-2 text-xs">BELI</a>
                    </div>
                `).join('');
            } catch (e) { grid.innerHTML = "Gagal memuat."; }
        }
    </script>
</body>
</html>

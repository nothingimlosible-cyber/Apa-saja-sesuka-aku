<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYPESTORE - Katalog Affiliate</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,700;0,800;1,800&display=swap');
        
        * { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            transition: all 0.3s ease; 
        }
        body { background-color: #f8fafc; }
        .hero-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        
        /* Utility untuk Admin */
        .admin-only { display: none !important; }
        body.is-admin .admin-only { display: block !important; }
        
        .line-clamp-1 {
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="pb-20" onload="load()">

    <nav class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md border-b px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black italic text-slate-900">HYPE<span class="text-indigo-600">STORE.</span></h1>
            <button onclick="toggleLogin()" class="text-slate-400 hover:text-indigo-600">
                <i class="fas fa-fingerprint text-2xl"></i>
            </button>
        </div>
    </nav>

    <section class="mt-24 px-4">
        <div class="max-w-7xl mx-auto hero-gradient rounded-[2.5rem] p-8 md:p-16 relative overflow-hidden shadow-xl text-center md:text-left">
            <div class="relative z-10">
                <span class="bg-indigo-500/20 text-indigo-300 text-[10px] font-black px-4 py-1.5 rounded-full uppercase italic border border-indigo-500/30">Official Katalog</span>
                <h2 class="text-4xl md:text-6xl font-black text-white mt-4 leading-tight uppercase italic">Style Baru <br>Mulai Disini.</h2>
                <a href="#katalog" class="inline-block bg-indigo-600 hover:bg-indigo-500 text-white px-8 py-3 rounded-xl font-black text-[11px] uppercase mt-8 shadow-lg">Eksplorasi</a>
            </div>
        </div>
    </section>

    <div id="loginBox" class="hidden fixed inset-0 z-[100] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-xs text-center border">
            <h3 class="font-black mb-4 text-slate-800">ADMIN ACCESS</h3>
            <input type="password" id="passInput" placeholder="Passkey" class="w-full p-4 bg-slate-50 rounded-2xl mb-4 text-center font-bold outline-none border focus:border-indigo-500">
            <button onclick="login()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black uppercase text-[11px] hover:bg-indigo-600">Authorize</button>
            <button onclick="toggleLogin()" class="mt-4 text-slate-400 text-[10px] uppercase font-bold hover:text-red-500">Batal</button>
        </div>
    </div>

    <section id="adminDashboard" class="admin-only px-4 mt-8">
        <div class="max-w-7xl mx-auto bg-white p-6 rounded-[2.5rem] border-2 border-dashed border-indigo-200 shadow-md">
            <h4 class="text-xs font-black text-indigo-600 mb-4 uppercase tracking-widest">Tambah Produk Baru</h4>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <input type="text" id="pName" placeholder="Nama Produk" class="p-4 bg-slate-50 rounded-xl outline-none border text-sm">
                <input type="text" id="pPrice" placeholder="Harga (Contoh: Rp 125.000)" class="p-4 bg-slate-50 rounded-xl outline-none border text-sm font-bold text-indigo-600">
                <input type="url" id="pLink" placeholder="Link Affiliate Shopee/TikTok" class="p-4 bg-slate-50 rounded-xl outline-none border text-sm">
                <input type="text" id="pSource" placeholder="SHOPEE / TIKTOK / TOKOPEDIA" class="p-4 bg-slate-50 rounded-xl outline-none border uppercase font-black text-[10px]">
                <div class="md:col-span-2">
                    <label class="text-[10px] font-bold text-slate-400 ml-2 uppercase">Foto Produk</label>
                    <input type="file" id="pFile" accept="image/*" class="w-full p-4 bg-slate-50 rounded-xl text-[10px] mt-1 border">
                </div>
            </div>
            <div class="flex gap-3 mt-6">
                <button onclick="saveProduct()" id="btnSave" class="flex-grow bg-indigo-600 text-white py-4 rounded-2xl font-black uppercase text-[11px] shadow-lg shadow-indigo-200">Publish</button>
                <button onclick="toggleDeleteMode()" id="btnDelete" class="bg-slate-800 text-white px-6 rounded-2xl hover:bg-red-600">
                    <i class="fas fa-trash"></i>
                </button>
            </div>
        </div>
    </section>

    <section id="katalog" class="px-4 py-12">
        <div class="max-w-7xl mx-auto">
            <h3 class="text-2xl font-black text-slate-900 uppercase italic mb-8 border-l-4 border-indigo-600 pl-4 tracking-tighter">Catalogue.</h3>
            <div id="grid" class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6">
                <p class="col-span-full text-center text-slate-400 py-10 italic">Memuat data produk...</p>
            </div>
        </div>
    </section>

    <script>
        let isDeleteActive = false;

        function toggleLogin() { 
            document.getElementById('loginBox').classList.toggle('hidden'); 
            document.getElementById('passInput').focus();
        }

        function toggleDeleteMode() { 
            isDeleteActive = !isDeleteActive; 
            const btn = document.getElementById('btnDelete');
            btn.classList.toggle('bg-red-600');
            btn.classList.toggle('bg-slate-800');
            load(); 
        }

        async function login() {
            const pass = document.getElementById('passInput').value;
            try {
                const res = await fetch('/api/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: pass })
                });
                const result = await res.json();
                if(result.success) { 
                    document.body.classList.add('is-admin'); 
                    toggleLogin(); 
                } else { 
                    alert("Passkey Salah!"); 
                }
            } catch (err) {
                alert("Gagal terhubung ke API Auth");
            }
        }

        async function load() {
            try {
                const res = await fetch('/api/katalog');
                const data = await res.json();
                const grid = document.getElementById('grid');
                
                if (data.length === 0) {
                    grid.innerHTML = `<p class="col-span-full text-center text-slate-400 py-10 italic">Belum ada produk.</p>`;
                    return;
                }

                grid.innerHTML = data.reverse().map(p => {
                    const n = p.nama || 'Produk';
                    const h = p.harga || 'Cek Harga';
                    const l = p.link || '#';
                    const s = p.source || 'HypeStore';
                    const i = p.img || 'https://via.placeholder.com/400x500?text=No+Image';

                    return `
                    <div class="bg-white rounded-[2rem] overflow-hidden border border-slate-100 p-2 shadow-sm relative group hover:shadow-xl hover:-translate-y-1">
                        ${isDeleteActive ? `<button onclick="delDoc('${p.id}')" class="absolute top-4 right-4 bg-red-600 text-white w-8 h-8 rounded-full z-20 shadow-lg hover:scale-110"><i class="fas fa-times"></i></button>` : ''}
                        <div class="overflow-hidden rounded-[1.6rem] aspect-[4/5] bg-slate-100">
                            <img src="${i}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                        </div>
                        <div class="p-3 text-center">
                            <span class="text-[8px] font-black uppercase text-indigo-500 tracking-widest">${s}</span>
                            <h3 class="text-[13px] font-bold text-slate-800 line-clamp-1 mt-1">${n}</h3>
                            <p class="text-slate-900 font-black text-sm my-2">${h}</p>
                            <a href="${l}" target="_blank" class="block w-full bg-slate-900 text-white py-3 rounded-xl text-[10px] font-black uppercase hover:bg-indigo-600">Beli Sekarang</a>
                        </div>
                    </div>`;
                }).join('');
            } catch (e) {
                document.getElementById('grid').innerHTML = `<p class="col-span-full text-center text-red-400">Gagal load data. Pastikan Vercel API & Google Sheets sudah siap.</p>`;
            }
        }

        async function saveProduct() {
            const btn = document.getElementById('btnSave');
            const fileInput = document.getElementById('pFile');
            const pName = document.getElementById('pName').value;
            const pPrice = document.getElementById('pPrice').value;
            const pLink = document.getElementById('pLink').value;
            const pSource = document.getElementById('pSource').value;

            if (!pName || !pPrice || fileInput.files.length === 0) {
                return alert("Mohon lengkapi Nama, Harga, dan Foto!");
            }
            
            btn.innerText = "Uploading Image..."; 
            btn.disabled = true;

            const reader = new FileReader();
            reader.readAsDataURL(fileInput.files[0]);
            reader.onload = async () => {
                try {
                    const base64Image = reader.result.split(',')[1];
                    const upRes = await fetch('/api/upload', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ image: base64Image })
                    });
                    const upData = await upRes.json();

                    if (upData.url) {
                        btn.innerText = "Saving Data...";
                        const productData = {
                            id: Date.now().toString(),
                            nama: pName,
                            harga: pPrice,
                            link: pLink,
                            source: pSource,
                            img: upData.url
                        };
                        
                        await fetch('/api/katalog', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(productData)
                        });

                        alert("Berhasil Publish!");
                        location.reload();
                    } else {
                        throw new Error("Upload Fail");
                    }
                } catch (err) {
                    alert("Gagal memproses data: " + err.message);
                    btn.innerText = "Publish";
                    btn.disabled = false;
                }
            };
        }

        async function delDoc(id) {
            if(confirm('Yakin ingin menghapus produk ini?')) {
                try {
                    await fetch(`/api/katalog?id=${id}`, { method: 'DELETE' });
                    load();
                } catch (err) {
                    alert("Gagal menghapus");
                }
            }
        }
    </script>
</body>
</html>

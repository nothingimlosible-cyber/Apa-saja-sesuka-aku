<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYPESTORE - Katalog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        * { font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.3s ease; }
        body { background-color: #f8fafc; padding-bottom: 5rem; }
        .hero-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        
        /* CSS ADMIN - JANGAN DIUBAH */
        .admin-only { display: none !important; }
        body.is-admin .admin-only { display: block !important; }
        
        /* Membatasi teks agar tidak berantakan */
        .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body onload="load()">

    <nav class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md border-b px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black italic text-slate-900">HYPE<span class="text-indigo-600">STORE.</span></h1>
            <button onclick="toggleLogin()" class="text-slate-400 hover:text-indigo-600">
                <i class="fas fa-fingerprint text-2xl"></i>
            </button>
        </div>
    </nav>

    <section class="mt-24 px-4">
        <div class="max-w-7xl mx-auto hero-gradient rounded-[2.5rem] p-8 md:p-16 relative overflow-hidden shadow-xl text-center md:text-left text-white">
            <span class="bg-indigo-500/20 text-indigo-300 text-[10px] font-black px-4 py-1.5 rounded-full uppercase border border-indigo-500/30">Official Katalog</span>
            <h2 class="text-4xl md:text-6xl font-black mt-4 leading-tight uppercase italic">Style Baru <br>Mulai Disini.</h2>
        </div>
    </section>

    <section id="adminDashboard" class="admin-only px-4 mt-8">
        <div class="max-w-7xl mx-auto bg-white p-6 rounded-[2.5rem] border-2 border-dashed border-indigo-200 shadow-md">
            <h4 class="text-xs font-black text-indigo-600 mb-4 uppercase tracking-widest">Tambah Produk</h4>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <input type="text" id="pName" placeholder="Nama Produk" class="p-4 bg-slate-50 rounded-xl border outline-none text-sm">
                <input type="text" id="pPrice" placeholder="Harga (Contoh: Rp 150.000)" class="p-4 bg-slate-50 rounded-xl border outline-none text-sm font-bold text-indigo-600">
                <input type="url" id="pLink" placeholder="Link Shopee/TikTok" class="p-4 bg-slate-50 rounded-xl border outline-none text-sm">
                <input type="text" id="pSource" placeholder="SHOPEE / TIKTOK" class="p-4 bg-slate-50 rounded-xl border outline-none font-black text-[10px]">
                <div class="md:col-span-2">
                    <input type="file" id="pFile" accept="image/*" class="w-full p-4 bg-slate-50 border rounded-xl text-[10px]">
                </div>
            </div>
            <button onclick="saveProduct()" id="btnSave" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black uppercase mt-4 hover:bg-indigo-700">Publish Produk</button>
        </div>
    </section>

    <section id="katalog" class="px-4 py-12">
        <div class="max-w-7xl mx-auto">
            <h3 class="text-2xl font-black text-slate-900 uppercase italic mb-8 border-l-4 border-indigo-600 pl-4">Catalogue.</h3>
            <div id="grid" class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6">
                <p class="col-span-full text-center text-slate-400 py-10 italic">Memuat katalog...</p>
            </div>
        </div>
    </section>

    <div id="loginBox" class="hidden fixed inset-0 z-[100] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-[2.5rem] w-full max-w-xs text-center shadow-2xl">
            <h3 class="font-black mb-4 uppercase text-xs">Admin Access</h3>
            <input type="password" id="passInput" placeholder="Passkey" class="w-full p-4 bg-slate-50 rounded-2xl mb-4 text-center border font-bold outline-none focus:border-indigo-500">
            <button onclick="login()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-[11px]">AUTHORIZE</button>
            <button onclick="toggleLogin()" class="mt-4 text-slate-400 text-[10px] font-bold uppercase">Batal</button>
        </div>
    </div>

    <script>
        function toggleLogin() { document.getElementById('loginBox').classList.toggle('hidden'); }

        async function login() {
            const pass = document.getElementById('passInput').value;
            try {
                const res = await fetch('/api/auth', { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({password: pass}) 
                });
                const result = await res.json();
                if(result.success) { 
                    document.body.classList.add('is-admin'); 
                    toggleLogin(); 
                    alert("Akses Diterima!");
                } else { alert("Sandi Salah!"); }
            } catch (err) { alert("Gagal koneksi server."); }
        }

        async function load() {
            const grid = document.getElementById('grid');
            try {
                const res = await fetch('/api/katalog');
                const data = await res.json();
                
                if (!data || data.length === 0) {
                    grid.innerHTML = `<p class="col-span-full text-center py-10">Belum ada produk.</p>`;
                    return;
                }

                // Bagian yang memperbaiki tampilan berantakan di gambar kamu
                grid.innerHTML = data.reverse().map(p => `
                    <div class="bg-white rounded-[2rem] overflow-hidden border border-slate-100 p-2 shadow-sm group hover:shadow-lg">
                        <div class="overflow-hidden rounded-[1.6rem] aspect-[4/5] bg-slate-100">
                            <img src="${p.img}" class="w-full h-full object-cover group-hover:scale-110 duration-500" onerror="this.src='https://via.placeholder.com/400x500?text=Error'">
                        </div>
                        <div class="p-3 text-center">
                            <span class="text-[8px] font-black uppercase text-indigo-500 tracking-widest">${p.source || 'AFFILIATE'}</span>
                            <h3 class="text-[12px] font-bold text-slate-800 line-clamp-1 mt-1">${p.nama || 'Produk'}</h3>
                            <p class="text-indigo-600 font-black text-sm my-2">${p.harga || 'Cek Harga'}</p>
                            <a href="${p.link}" target="_blank" class="block w-full bg-slate-900 text-white py-2.5 rounded-xl text-[10px] font-black uppercase hover:bg-indigo-600">Beli Sekarang</a>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                grid.innerHTML = `<p class="col-span-full text-center text-red-400 py-10">Gagal memuat katalog.</p>`;
            }
        }

        async function saveProduct() {
            const btn = document.getElementById('btnSave');
            const file = document.getElementById('pFile').files[0];
            const pName = document.getElementById('pName').value;
            const pPrice = document.getElementById('pPrice').value;
            const pLink = document.getElementById('pLink').value;
            const pSource = document.getElementById('pSource').value || "SHOPEE";

            if (!file || !pName || !pPrice || !pLink) return alert("Lengkapi data!");
            
            btn.innerText = "Processing..."; 
            btn.disabled = true;

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                try {
                    const base64 = reader.result;
                    const upRes = await fetch('/api/upload', { 
                        method: 'POST', 
                        headers: {'Content-Type': 'application/json'}, 
                        body: JSON.stringify({ image: base64 }) 
                    });
                    const upData = await upRes.json();

                    if (upData.success) {
                        await fetch('/api/katalog', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({
                                id: Date.now().toString(),
                                nama: pName, link: pLink, harga: pPrice,
                                source: pSource.toUpperCase(), img: upData.url
                            })
                        });
                        alert("Berhasil!");
                        location.reload();
                    }
                } catch (err) {
                    alert("Gagal!");
                    btn.innerText = "Publish Produk";
                    btn.disabled = false;
                }
            };
        }
    </script>
</body>
</html>

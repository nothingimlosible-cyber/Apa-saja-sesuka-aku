<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYPESTORE - Katalog Affiliate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap');
        * { font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.2s ease; scroll-behavior: smooth; }
        body { background-color: #f8fafc; padding-bottom: 5rem; }
       .hero-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
       .admin-only { display: none!important; }
        body.is-admin.admin-only { display: block!important; } /* INI YANG BENER - ADA SPASI */
       .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
       .card-hover:hover { box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
      
        @keyframes modalZoom {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
       .modal-content { animation: modalZoom 0.3s ease-out; }
    </style>
</head>
<body onload="load()">

    <!-- NAVBAR -->
    <nav class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md border-b px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black italic text-slate-900">HYPE<span class="text-indigo-600">STORE.</span></h1>
            <button onclick="toggleLogin()" class="text-slate-400 hover:text-indigo-600">
                <i class="fas fa-fingerprint text-2xl"></i>
            </button>
        </div>
    </nav>

    <!-- HERO -->
    <section class="mt-24 px-4">
        <div class="max-w-7xl mx-auto hero-gradient rounded-[2.5rem] p-8 md:p-16 relative overflow-hidden shadow-xl text-center md:text-left">
            <div class="relative z-10">
                <span class="bg-indigo-500/20 text-indigo-300 text- font-black px-4 py-1.5 rounded-full uppercase italic border border-indigo-500/30">Official Katalog</span>
                <h2 class="text-4xl md:text-6xl font-black text-white mt-4 leading-tight uppercase italic">Style Baru <br>Mulai Disini.</h2>
                <a href="#katalog" class="inline-block bg-indigo-600 hover:bg-indigo-500 text-white px-8 py-3 rounded-xl font-black text- uppercase mt-8 shadow-lg">Eksplorasi</a>
            </div>
        </div>
    </section>

    <!-- ADMIN -->
    <section id="adminDashboard" class="admin-only px-4 mt-8">
        <div class="max-w-7xl mx-auto bg-white p-6 rounded-[2.5rem] border-2 border-dashed border-indigo-200 shadow-md">
            <h4 class="text-xs font-black text-indigo-600 mb-4 uppercase tracking-widest">Tambah Produk Baru</h4>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <input type="text" id="pName" placeholder="Nama Produk" class="p-4 bg-slate-50 rounded-xl border text-sm outline-none">
                <input type="number" id="pPrice" placeholder="15000" class="p-4 bg-slate-50 rounded-xl border text-sm font-bold text-indigo-600 outline-none">
                <input type="url" id="pLink" placeholder="Link Affiliate Shopee/TikTok" class="p-4 bg-slate-50 rounded-xl border text-sm outline-none">
                <input type="text" id="pSource" placeholder="SHOPEE / TIKTOK" class="p-4 bg-slate-50 rounded-xl border font-black text- outline-none">
                <div class="md:col-span-2">
                    <input type="file" id="pFile" accept="image/*" class="w-full p-4 bg-slate-50 rounded-xl text- border outline-none">
                </div>
            </div>
            <div class="flex gap-3 mt-6">
                <button onclick="saveProduct()" id="btnSave" class="flex-grow bg-indigo-600 text-white py-4 rounded-2xl font-black uppercase text- hover:bg-indigo-700 disabled:bg-slate-400">Publish Produk</button>
                <button onclick="toggleDeleteMode()" id="btnDelete" class="bg-slate-800 text-white px-6 rounded-2xl hover:bg-red-600"><i class="fas fa-trash"></i></button>
            </div>
        </div>
    </section>

    <!-- KATALOG -->
    <section id="katalog" class="px-4 py-12">
        <div class="max-w-7xl mx-auto">
            <h3 class="text-2xl font-black text-slate-900 uppercase italic mb-8 border-l-4 border-indigo-600 pl-4">Catalogue.</h3>
            <div id="grid" class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6">
                <p class="col-span-full text-center text-slate-400 py-10 italic">Memuat koleksi produk...</p>
            </div>
        </div>
    </section>

    <!-- MODAL DETAIL PRODUK GEDE -->
    <div id="productModal" class="hidden fixed inset-0 z-[100] bg-black/80 backdrop-blur-md flex items-center justify-center p-4" onclick="closeModal()">
        <div class="modal-content bg-white rounded- max-w-2xl w-full max-h- overflow-y-auto" onclick="event.stopPropagation()">
            <div class="relative">
                <img id="modalImg" src="" class="w-full aspect-square object-cover rounded-t-">
                <button onclick="closeModal()" class="absolute top-4 right-4 bg-white/90 text-slate-900 w-11 h-11 rounded-full shadow-xl hover:bg-white hover:scale-110">
                    <i class="fas fa-times text-lg"></i>
                </button>
            </div>
            <div class="p-6 md:p-8">
                <span id="modalSource" class="text-xs font-black uppercase text-indigo-500 tracking-widest"></span>
                <h3 id="modalNama" class="text-2xl font-bold text-slate-900 mt-3 leading-snug"></h3>
                <p id="modalHarga" class="text-indigo-600 font-black text-3xl mt-5"></p>
                <a id="modalLink" href="" target="_blank" rel="noopener noreferrer" class="block w-full bg-slate-900 text-white py-4 rounded-2xl text-base font-black uppercase hover:bg-indigo-600 mt-8 text-center shadow-lg">Beli Sekarang</a>
            </div>
        </div>
    </div>

    <!-- LOGIN -->
    <div id="loginBox" class="hidden fixed inset-0 z-[100] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-xs text-center border">
            <h3 class="font-black mb-4">ADMIN ACCESS</h3>
            <input type="password" id="passInput" placeholder="Passkey" class="w-full p-4 bg-slate-50 rounded-2xl mb-4 text-center font-bold border outline-none focus:border-indigo-500">
            <button onclick="login()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black uppercase text-">Authorize</button>
            <button onclick="toggleLogin()" class="mt-4 text-slate-400 text- uppercase font-bold">Batal</button>
        </div>
    </div>

    <script>
        let isDeleteActive = false;
        let allProducts = [];

        function toggleLogin() { document.getElementById('loginBox').classList.toggle('hidden'); }
        function toggleDeleteMode() { 
            isDeleteActive =!isDeleteActive; 
            document.getElementById('btnDelete').classList.toggle('bg-red-600');
            load(); 
        }

        function closeModal() {
            document.getElementById('productModal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function openModal(id) {
            const p = allProducts.find(prod => prod.id === id);
            if (!p) return;
            
            const angkaDoang = p.harga? p.harga.toString().replace(/\D/g, '') : '';
            const hargaFinal = angkaDoang? `Rp. ${Number(angkaDoang).toLocaleString('id-ID')}` : 'Cek Harga';
            
            document.getElementById('modalImg').src = p.img;
            document.getElementById('modalSource').innerText = p.source || 'AFFILIATE';
            document.getElementById('modalNama').innerText = p.nama || 'Produk';
            document.getElementById('modalHarga').innerText = hargaFinal;
            document.getElementById('modalLink').href = p.link;
            document.getElementById('productModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        async function login() {
            const pass = document.getElementById('passInput').value;
            try {
                const res = await fetch('/api/auth', { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({password: pass}) 
                });
                const result = await res.json();
                if(result.success) { 
                    document.body.classList.add('is-admin'); 
                    toggleLogin(); 
                } else { alert("Passkey Salah!"); }
            } catch (err) { alert("Gagal Login"); }
        }

        async function load() {
            const grid = document.getElementById('grid');
            try {
                const res = await fetch('/api/katalog');
                const data = await res.json();
                
                if (!data || data.length === 0) {
                    grid.innerHTML = `<p class="col-span-full text-center text-slate-400 py-10 italic">Belum ada produk.</p>`;
                    return;
                }

                allProducts = data;

                grid.innerHTML = data.reverse().map(p => {
                    const angkaDoang = p.harga? p.harga.toString().replace(/\D/g, '') : '';
                    const hargaFinal = angkaDoang? `Rp. ${Number(angkaDoang).toLocaleString('id-ID')}` : 'Cek Harga';

                    return `
                    <div class="bg-white rounded- overflow-hidden border border-slate-100 p-2 shadow-sm relative group card-hover cursor-pointer" onclick="openModal('${p.id}')">
                        ${isDeleteActive? `<button onclick="event.stopPropagation(); delDoc('${p.id}')" class="absolute top-4 right-4 bg-red-600 text-white w-8 h-8 rounded-full z-20 shadow-lg"><i class="fas fa-times"></i></button>` : ''}
                        <div class="overflow-hidden rounded-[1.6rem] aspect-[4/5] bg-slate-100">
                            <img src="${p.img}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/400x500?text=Error'">
                        </div>
                        <div class="p-3 text-center">
                            <span class="text-[8px] font-black uppercase text-indigo-500 tracking-widest">${p.source || 'AFFILIATE'}</span>
                            <h3 class="text- font-bold text-slate-800 line-clamp-1 mt-1">${p.nama || 'Produk'}</h3>
                            <p class="text-indigo-600 font-black text-sm my-2">${hargaFinal}</p>
                            <a href="${p.link}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()" class="block w-full bg-slate-900 text-white py-3 rounded-xl text- font-black uppercase hover:bg-indigo-600">Beli Sekarang</a>
                        </div>
                    </div>`;
                }).join('');
            } catch (e) {
                grid.innerHTML = `<p class="col-span-full text-center text-red-400 py-10">Gagal memuat katalog.</p>`;
            }
        }

        async function saveProduct() {
            const btn = document.getElementById('btnSave');
            const file = document.getElementById('pFile').files[0];
            const pName = document.getElementById('pName').value;
            const pPrice = document.getElementById('pPrice').value;
            const pLink = document.getElementById('pLink').value;
            const pSource = document.getElementById('pSource').value || "SHOPEE";

            if (!file ||!pName ||!pPrice ||!pLink) return alert("Lengkapi Semua Data & Foto!");
            
            btn.innerText = "Processing..."; 
            btn.disabled = true;

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                try {
                    const base64 = reader.result;
                    
                    const upRes = await fetch('/api/upload', { 
                        method: 'POST', 
                        headers: {'Content-Type': 'application/json'}, 
                        body: JSON.stringify({ image: base64 }) 
                    });
                    const upData = await upRes.json();

                    if (upData.success && upData.url) {
                        const response = await fetch('/api/katalog', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({
                                id: Date.now().toString(),
                                nama: pName,
                                link: pLink,
                                harga: pPrice,
                                source: pSource.toUpperCase(),
                                img: upData.url
                            })
                        });

                        if(response.ok) {
                            alert("Berhasil!");
                            location.reload();
                        } else { throw new Error("Gagal simpan database"); }
                    } else { throw new Error(upData.error || "Gagal upload gambar"); }
                } catch (err) {
                    alert("Error: " + err.message);
                    btn.innerText = "Publish Produk";
                    btn.disabled = false;
                }
            };
        }

        async function delDoc(id) {
            if(confirm('Hapus produk ini?')) {
                try {
                    await fetch(`/api/katalog?id=${id}`, { method: 'DELETE' });
                    load();
                } catch (err) { alert("Gagal Menghapus"); }
            }
        }
    </script>
</body>
</html>

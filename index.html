<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYPESTORE - Exclusive Catalog</title>
    <script src="https://tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        @import url('https://googleapis.com');
        * { font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.3s ease; scroll-behavior: smooth; }
        body { background-color: #fcfcfc; }
        .nav-glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .hero-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .admin-only { display: none !important; }
        .is-admin .admin-only { display: block !important; }
    </style>
</head>
<body class="pb-32" onload="load()">

    <!-- Navbar -->
    <nav class="fixed top-0 w-full z-[100] nav-glass px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black italic text-slate-900">HYPE<span class="text-indigo-600">STORE.</span></h1>
            <div class="flex gap-3">
                <button onclick="toggleLogin()" class="text-slate-300 p-2"><i class="fas fa-fingerprint text-xl"></i></button>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="mt-24 px-6">
        <div class="max-w-7xl mx-auto hero-gradient rounded-[3rem] p-10 md:p-16 relative overflow-hidden shadow-2xl">
            <div class="relative z-10 text-left">
                <span class="bg-indigo-500/20 text-indigo-300 text-[10px] font-black px-4 py-1.5 rounded-full uppercase italic border border-indigo-500/30">Affiliate resmi</span>
                <h2 class="text-4xl md:text-6xl font-black text-white mt-6 leading-none uppercase italic">Style Baru <br>Setiap Hari.</h2>
                <div class="mt-10"><a href="#katalog" class="inline-block bg-indigo-600 text-white px-10 py-4 rounded-2xl font-black text-xs uppercase shadow-xl">Eksplorasi Katalog</a></div>
            </div>
        </div>
    </section>

    <!-- Login Modal -->
    <div id="loginBox" class="hidden fixed inset-0 z-[200] bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-6 text-center">
        <div class="bg-white p-10 rounded-[3rem] shadow-2xl w-full max-w-xs">
            <input type="password" id="passInput" placeholder="Masukkan Passkey" class="w-full p-4 bg-slate-50 rounded-2xl mb-4 text-center font-bold outline-none border border-slate-100">
            <button onclick="login()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black uppercase text-[10px]">Authorize</button>
            <button onclick="toggleLogin()" class="mt-4 text-slate-400 text-[10px] uppercase font-bold">Batal</button>
        </div>
    </div>

    <!-- Admin Dashboard (Hanya muncul jika login sukses) -->
    <section id="adminDashboard" class="admin-only px-6 mt-10">
        <div class="max-w-7xl mx-auto bg-white p-8 rounded-[3.5rem] border-2 border-dashed border-indigo-100 shadow-xl">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="pName" placeholder="Nama Produk" class="p-4 bg-slate-50 rounded-xl outline-none border border-slate-100">
                <input type="text" id="pPrice" placeholder="Harga (Contoh: Rp 150rb)" class="p-4 bg-slate-50 rounded-xl outline-none border border-slate-100 font-bold text-indigo-600">
                <input type="url" id="pLink" placeholder="Link Affiliate" class="p-4 bg-slate-50 rounded-xl outline-none border border-slate-100">
                <input type="text" id="pSource" placeholder="Marketplace (Shopee/TikTok)" class="p-4 bg-slate-50 rounded-xl outline-none border border-slate-100 uppercase">
                <input type="file" id="pFile" class="md:col-span-2 p-4 bg-slate-50 rounded-xl text-xs">
            </div>
            <div class="flex gap-4 mt-6">
                <button onclick="saveProduct()" id="btnSave" class="flex-grow bg-indigo-600 text-white py-5 rounded-2xl font-black uppercase text-[11px] shadow-lg">Upload ke Katalog</button>
                <button onclick="toggleDeleteMode()" class="bg-slate-800 text-white px-8 rounded-2xl"><i class="fas fa-trash"></i></button>
            </div>
        </div>
    </section>

    <!-- Katalog List -->
    <section id="katalog" class="px-6 py-16">
        <div class="max-w-7xl mx-auto">
            <h3 class="text-3xl font-black text-slate-900 uppercase italic mb-10 border-b pb-6">Catalogue <span class="text-indigo-600">List.</span></h3>
            <div id="grid" class="grid grid-cols-2 md:grid-cols-4 gap-6">
                <!-- Data Produk Masuk Sini -->
                <p class="col-span-full text-center text-slate-400 italic">Memuat data...</p>
            </div>
        </div>
    </section>

    <script>
        let isDeleteActive = false;

        function toggleLogin() { document.getElementById('loginBox').classList.toggle('hidden'); }
        function toggleDeleteMode() { isDeleteActive = !isDeleteActive; load(); }

        // 1. LOGIN (Cek ke server Vercel, bukan di HTML)
        async function login() {
            const pass = document.getElementById('passInput').value;
            const res = await fetch('/api/auth', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: pass })
            });
            const result = await res.json();
            if(result.success) { 
                document.body.classList.add('is-admin'); 
                toggleLogin(); 
                alert("Selamat datang, Admin!");
            } else { 
                alert("Passkey Salah!"); 
            }
        }

        // 2. LOAD DATA (Ambil dari API Jembatan)
        async function load() {
            try {
                const res = await fetch('/api/katalog');
                const data = await res.json();
                const grid = document.getElementById('grid');
                grid.innerHTML = data.reverse().map(p => `
                    <div class="group bg-white rounded-[2.5rem] overflow-hidden border border-slate-50 p-2 shadow-sm relative hover:shadow-xl transition-all">
                        ${isDeleteActive ? `<button onclick="delDoc('${p.id}')" class="absolute top-4 right-4 bg-red-600 text-white w-8 h-8 rounded-full z-20 shadow-lg">×</button>` : ''}
                        <img src="${p.img}" class="aspect-[4/5] rounded-[2rem] object-cover mb-2">
                        <div class="p-4 text-center">
                            <h3 class="text-[10px] font-bold uppercase text-slate-500">${p.source}</h3>
                            <h3 class="text-sm font-black text-slate-800 line-clamp-1">${p.nama}</h3>
                            <p class="text-indigo-600 font-black text-sm my-2">${p.harga}</p>
                            <a href="${p.link}" target="_blank" class="block w-full bg-slate-900 text-white py-3 rounded-xl text-[10px] font-black uppercase tracking-widest">Beli Sekarang</a>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                console.error("Gagal memuat data");
            }
        }

        // 3. UPLOAD & SAVE (Gambar ke API Upload, Data ke API Katalog)
        async function saveProduct() {
            const btn = document.getElementById('btnSave');
            const fileInput = document.getElementById('pFile');
            if (fileInput.files.length === 0) return alert("Pilih foto dulu!");
            
            btn.innerText = "Processing...";
            btn.disabled = true;

            const reader = new FileReader();
            reader.readAsDataURL(fileInput.files[0]);
            reader.onload = async () => {
                const base64Image = reader.result.split(',')[1];

                // Upload Gambar lewat API aman
                const upRes = await fetch('/api/upload', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: base64Image })
                });
                const upData = await upRes.json();

                if (upData.url) {
                    const productData = {
                        id: Date.now().toString(),
                        nama: document.getElementById('pName').value,
                        harga: document.getElementById('pPrice').value,
                        link: document.getElementById('pLink').value,
                        source: document.getElementById('pSource').value,
                        img: upData.url
                    };

                    // Simpan Data ke SheetDB lewat API jembatan
                    await fetch('/api/katalog', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(productData)
                    });

                    alert("Berhasil di-publish!");
                    location.reload();
                } else {
                    alert("Gagal upload gambar!");
                    btn.innerText = "Upload ke Katalog";
                    btn.disabled = false;
                }
            };
        }

        // 4. HAPUS DATA
        async function delDoc(id) {
            if(confirm('Hapus produk ini?')) {
                await fetch(`/api/katalog?id=${id}`, { method: 'DELETE' });
                load();
            }
        }
    </script>
</body>
</html>
